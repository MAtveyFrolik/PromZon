<!doctype html>
<html lang="ru">
  <head>
    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сообщения и Переговоры — PromZona B2B</title>
    
    <!-- Deep premium typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS dynamic engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    
    <!-- Lucide Icons dynamic script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- JSZip for dynamic zip generation and download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/_aistudio-iframe.js"></script></head>
  <body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800 antialiased selection:bg-amber-500 selection:text-slate-950">
    
    <div id="header"></div>

    <main class="flex-grow">
      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 h-[calc(100vh-64px)] max-h-[750px]">
        <div class="bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden flex h-full">
          
          <!-- Left Contacts sidebar -->
          <div class="w-full sm:w-80 border-r border-gray-150 flex flex-col h-full bg-slate-50/50">
            <div class="p-4 border-b border-gray-150 bg-white">
              <h1 class="text-sm font-black uppercase tracking-widest text-slate-900 flex items-center">
                <i data-lucide="message-square" class="h-4.5 w-4.5 text-amber-500 mr-2"></i>
                Переговоры / Тендеры
              </h1>
            </div>

            <!-- Contacts list -->
            <div id="contacts-list" class="flex-1 overflow-y-auto divide-y divide-gray-100">
              <!-- Dynamically Injected Contacts -->
            </div>
          </div>

          <!-- Right messaging stage -->
          <div class="hidden sm:flex flex-1 flex-col h-full bg-white justify-between" id="chat-stage">
            <div class="p-4 border-b border-gray-150 flex items-center justify-between bg-white shrink-0">
              <div class="flex items-center space-x-3">
                <img id="chat-header-avatar" src="" alt="" class="h-9 w-9 rounded-xl object-contain border border-gray-200 bg-slate-50 p-0.5" />
                <div>
                  <h3 id="chat-header-name" class="font-extrabold text-xs text-slate-900">...</h3>
                  <span class="text-[9px] text-emerald-500 font-extrabold uppercase tracking-wide">● В сети (Снабжение)</span>
                </div>
              </div>
              <button class="px-3 py-1.5 border border-amber-500 text-amber-600 bg-amber-500/5 hover:bg-amber-500/10 text-3xs font-black uppercase tracking-widest rounded-lg flex items-center space-x-1.5">
                <i data-lucide="clipboard-list" class="h-3.5 w-3.5"></i>
                <span>Запросить КП</span>
              </button>
            </div>

            <!-- Message list items slider -->
            <div id="messages-scroller" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/20">
              <!-- Dynamically Injected Messages -->
            </div>

            <!-- TextInput form bar -->
            <div class="p-4 border-t border-gray-150 bg-white flex items-center space-x-2 shrink-0">
              <input 
                type="text" 
                id="message-text-input" 
                placeholder="Напишите техническое требование по детали..." 
                class="flex-grow bg-slate-50 focus:bg-white border border-gray-150 focus:border-amber-500 focus:outline-none p-3.5 rounded-xl text-xs font-bold transition-all text-slate-900"
              />
              <button 
                id="send-msg-btn"
                class="p-3.5 rounded-xl bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-slate-950 transition-all flex items-center justify-center shrink-0"
              >
                <i data-lucide="send" class="h-4.5 w-4.5"></i>
              </button>
            </div>
          </div>

        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script type="module" src="/messages.html?html-proxy&index=0.js"></script>
  </body>
</html>
