<!doctype html>
<html lang="ru">
  <head>
    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет — PromZona B2B</title>
    
    <!-- Deep premium typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS dynamic engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    
    <!-- Lucide Icons dynamic script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- JSZip for dynamic zip generation and download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/_aistudio-iframe.js"></script></head>
  <body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800 antialiased selection:bg-amber-500 selection:text-slate-950">
    
    <div id="header"></div>

    <main class="flex-grow">
      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-8">
        
        <!-- Top user profiling bar -->
        <div class="bg-slate-900 text-white p-6 sm:p-8 rounded-3xl border border-slate-800 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-md">
          <div>
            <span class="text-3xs uppercase font-extrabold tracking-widest text-slate-400">Кабинет завода // Снабжение</span>
            <h2 class="text-xl sm:text-2.5xl font-black mt-1">ОАО Промышленный Узел</h2>
            <span class="block text-rxs text-emerald-400 font-mono mt-0.5">ИНН: 7704112233 // Лицензия СРО №4432-АК</span>
          </div>
          <a href="create-ad.html" class="px-5 py-3 bg-amber-500 hover:bg-amber-600 text-slate-950 font-black text-xs uppercase tracking-widest rounded-xl transition-all shadow-md flex items-center space-x-2">
            <i data-lucide="plus" class="h-4.5 w-4.5"></i>
            <span>Разместить объявление</span>
          </a>
        </div>

        <!-- Main columns -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          <!-- Left: Current Ads list -->
          <div class="lg:col-span-8 bg-white p-6 rounded-3xl border border-gray-200 space-y-6 shadow-3xs">
            <div>
              <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 pb-2 border-b border-gray-100">Мои активные объявления о мощностях</h3>
              <p class="text-3xs text-gray-400 mt-1">Эти лоты видны B2B покупателям по всей России</p>
            </div>

            <div id="my-ads-container" class="space-y-4">
              <!-- Dynamically Injected -->
            </div>
          </div>

          <!-- Right stats metrics -->
          <div class="lg:col-span-4 bg-white p-6 rounded-3xl border border-gray-200 h-fit space-y-6 shadow-3xs">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 pb-2 border-b border-gray-100">Статистика показов за май</h3>
            <div class="grid grid-cols-2 gap-4">
              <div class="p-3 bg-slate-50 border border-gray-150 rounded-2xl">
                <span class="block text-2xs font-extrabold text-gray-400 uppercase tracking-wide">Просмотры</span>
                <span class="block text-xl font-black text-slate-900 mt-1 font-mono">420</span>
              </div>
              <div class="p-3 bg-slate-50 border border-gray-150 rounded-2xl">
                <span class="block text-2xs font-extrabold text-gray-400 uppercase tracking-wide">Запросов КП</span>
                <span class="block text-xl font-black text-amber-600 mt-1 font-mono">18</span>
              </div>
            </div>
          </div>

        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script type="module" src="/dashboard.html?html-proxy&index=0.js"></script>
  </body>
</html>
