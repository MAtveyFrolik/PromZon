<!doctype html>
<html lang="ru">
  <head>
    <script type="module" src="/@vite/client"></script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Промышленные Производители — PromZona B2B</title>
    
    <!-- Deep premium typography from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS dynamic engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    
    <!-- Lucide Icons dynamic script -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- JSZip for dynamic zip generation and download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/_aistudio-iframe.js"></script></head>
  <body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-800 antialiased selection:bg-amber-500 selection:text-slate-950">
    
    <div id="header"></div>

    <main class="flex-grow">
      <section class="bg-slate-900 text-white py-12 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-r from-amber-500/10 to-orange-500/10 opacity-30"></div>
        <div class="max-w-7xl mx-auto px-4 relative z-10 space-y-2">
          <h1 class="text-2xl sm:text-3.5xl font-black text-white tracking-tight uppercase">Промышленные Производители</h1>
          <p class="text-xs text-slate-300 font-semibold max-w-xl">
            Автоматизированные цеха, тяжелые заводы и холдинги, прошедшие выездную проверку PromZona ОТК.
          </p>
        </div>
      </section>

      <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
          
          <!-- Sidebar filters -->
          <div class="bg-white p-5 rounded-2xl border border-gray-200 space-y-6 h-fit shadow-2xs">
            <div class="flex justify-between items-center pb-3 border-b border-gray-100">
              <span class="font-extrabold text-xs text-slate-900 uppercase tracking-wider flex items-center">
                <i data-lucide="sliders-horizontal" class="h-4 w-4 mr-1.5 text-amber-500"></i>
                Фильтр заводов
              </span>
              <button id="reset-filters" class="text-[10px] font-extrabold text-amber-600 uppercase tracking-widest hover:text-amber-700">Сбросить</button>
            </div>

            <div class="space-y-3">
              <label class="text-[10px] uppercase font-extrabold text-slate-400 tracking-wider">Масштаб цеха</label>
              <div class="space-y-2 text-xs font-semibold text-slate-700">
                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="filter-enterprise" checked class="rounded border-gray-300 text-amber-500 focus:ring-amber-500 h-4 w-4" />
                  <span>Enterprise (Крупные)</span>
                </label>
                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="filter-medium" checked class="rounded border-gray-300 text-amber-500 focus:ring-amber-500 h-4 w-4" />
                  <span>Medium (Средние)</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Main content grid -->
          <div class="lg:col-span-3 space-y-6">
            <div class="flex items-center justify-between text-xs font-bold text-gray-500 bg-white p-4 rounded-xl border border-gray-150">
              <span>Холдингов в реестре: <span id="manufacturers-count" class="text-slate-900 font-extrabold">0</span></span>
              <span>Фильтрация: <span class="text-emerald-500">ОТК Верифицированы</span></span>
            </div>

            <div id="manufacturers-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <!-- Dynamically Injected -->
            </div>
          </div>

        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script type="module" src="/production.html?html-proxy&index=0.js"></script>
  </body>
</html>
